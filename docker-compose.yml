version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: uziel_os_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uziel_os}
      POSTGRES_USER: ${POSTGRES_USER:-uziel_os_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uziel_os_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: uziel_os_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: uziel_os_backend
    restart: always
    command: /app/entrypoint.sh
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: ./backend
    container_name: uziel_os_celery_worker
    restart: always
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - db
      - redis
      - backend

  celery_beat:
    build:
      context: ./backend
    container_name: uziel_os_celery_beat
    restart: always
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - db
      - redis
      - backend

volumes:
  postgres_data:
  redis_data:
